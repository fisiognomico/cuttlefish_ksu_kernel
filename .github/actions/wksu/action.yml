name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking
inputs:
  ksu_commit:
    description: 'KSU commit or tag to checkout (default: latest tag)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Download Wild KSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -ex
        # Wild_KSU already has SUSFS integrated in its driver source,
        # so no separate KSU patching is needed for SUSFS support.
        curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/stable/kernel/setup.sh" | bash -s ${{ inputs.ksu_commit }}

    - name: Enable KernelSU Config
      shell: bash
      run: |
        cat >> "$GITHUB_WORKSPACE/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF

    - name: Extract KSU Version Info
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/Wild_KSU
      run: |
        set -x
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "0")
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

        echo "Wild KSU tag: $KSU_GIT_TAG, version: $KSU_VERSION, commit: $KSU_COMMIT"

    - name: Add Wild_KSU to bazelignore
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        # Prevent bazel from traversing the Wild_KSU directory
        if ! grep -q "^Wild_KSU$" .bazelignore 2>/dev/null; then
          echo "Wild_KSU" >> .bazelignore
        fi

        # Commit driver symlink and Kconfig/Makefile changes in common/
        # so the bazel build sees a consistent source tree
        cd common
        git config user.name "build"
        git config user.email "build@localhost"
        git add -A
        if [[ -n "$(git status --porcelain)" ]]; then
          git commit -m "Add Wild KSU support (tag: $KSU_GIT_TAG)"
        fi
